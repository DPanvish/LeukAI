version: "3.9"

services:
  # ── MongoDB ────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: leukemia-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - leukemia-net

  # ── Backend (FastAPI) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leukemia-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
    depends_on:
      - mongodb
    volumes:
      - ./backend/ml_models:/app/ml_models
    networks:
      - leukemia-net

  # ── Frontend (Vite — dev) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leukemia-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - leukemia-net

volumes:
  mongo_data:

networks:
  leukemia-net:
    driver: bridge
